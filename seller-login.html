<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Login | Chasing Dreams Events</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="black">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/logo_result.webp">

  <script src="_js/vendor/slim.min.js"></script>
  <link rel="stylesheet" href="_css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="_js/vendor/axios.min.js"></script>
  <script src="_js/vendor/vue.js"></script>
  <script src="_js/data/static-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <link rel="stylesheet" href="_css/test.css" />
  <link rel="stylesheet" href="_css/header.css" />
  <link rel="stylesheet" href="_css/footer.css" />
  <link rel="stylesheet" href="_css/seller-login.css" />
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light custom-navbar">
    <a id="logo-area" class="navbar-brand" href="index.html">
      <img id="logo" src="images/logo_result.webp" width="30" height="30" alt="Chasing Dreams Events Logo" />
    </a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ml-auto">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="shop.html">Shop</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="packages.html">Packages</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="quotation.html">Quotation</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="cloudinary-structure.html">Cloudinary Folder Structure</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Login Card -->
  <div id="seller-login-app" class="seller-login-page">
    <div class="seller-login-card">
      <img src="images/logo_result.webp" alt="Chasing Dreams Events" class="seller-login-logo" />
      <h1 class="seller-login-title">Seller Login</h1>
      <p class="seller-login-subtitle">Internal access only &mdash; credentials provided by the business</p>

      <div class="seller-login-error" v-if="error">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ error }}
      </div>

      <form @submit.prevent="login">
        <label class="seller-login-label" for="login-email">Email Address</label>
        <input
          id="login-email"
          class="seller-login-input"
          type="email"
          v-model="email"
          placeholder="you@example.com"
          autocomplete="username"
          :disabled="loading"
        />

        <label class="seller-login-label" for="login-password">Password</label>
        <input
          id="login-password"
          class="seller-login-input"
          type="password"
          v-model="password"
          placeholder="••••••••"
          autocomplete="current-password"
          :disabled="loading"
        />

        <button type="submit" class="seller-login-btn" :disabled="loading">
          <span v-if="!loading"><i class="fa-solid fa-right-to-bracket"></i> Sign In</span>
          <span v-else><i class="fa-solid fa-circle-notch fa-spin"></i> Signing in…</span>
        </button>
      </form>

      <a href="index.html" class="seller-login-back">
        <i class="fa-solid fa-arrow-left"></i> Back to site
      </a>
    </div>
  </div>

  <script src="_js/integrations/supabase.js"></script>
  <script src="_js/pages/seller-login.js"></script>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
